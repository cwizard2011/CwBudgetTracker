buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
        // So libraries (e.g. react-native-gesture-handler) don't need `node` on PATH during Gradle config
        REACT_NATIVE_NODE_MODULES_DIR = new File(rootDir.parentFile, "node_modules/react-native").absolutePath
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.9.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
        classpath("com.google.gms:google-services:4.3.15")
    }
}

plugins {
    id("com.facebook.react.rootproject")
}